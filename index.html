<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Existente</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: 'Cinzel', serif;
color:white;
overflow:hidden;
}

/* VÍDEO FUNDO */
#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* CAMADA ESCURA PARA CINEMATOGRAFIA */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.85));
z-index:-2;
}

/* REFLEXO DE VIDRO SUTIL */
.glass{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg, rgba(255,255,255,0.05), transparent 40%);
pointer-events:none;
z-index:-1;
}

/* TÍTULO */
#titulo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:4rem;
text-align:center;
letter-spacing:4px;
text-shadow:0 0 20px rgba(150,0,0,0.7);
}

/* Souls */
.top-right{
position:fixed;
top:20px;
right:30px;
letter-spacing:3px;
font-size:14px;
opacity:0.8;
}

/* MENU */
.menu-icon{
position:fixed;
top:20px;
left:30px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.95);
padding:60px 30px;
transition:0.5s;
border-right:1px solid darkred;
z-index:999;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:20px 0;
font-size:18px;
transition:0.3s;
}

.menu a:hover{
color:darkred;
}

</style>
</head>

<body>

<!-- VIDEO FUNDO -->
<video autoplay muted loop playsinline id="bg-video">
<source src="sangue.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="glass"></div>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Relíquias</a>
</div>

<h1 id="titulo">Planeta Existente</h1>

<script>

function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
}

/* IDIOMAS */
const titulo=document.getElementById("titulo");

const idiomas=[
"Planeta Existente",
"Υπάρχων Πλανήτης",
"כוכב קיים",
"존재하는 행성",
"كوكب موجود",
"ดาวเคราะห์ที่มีอยู่",
"Существующая Планета"
];

let index=0;

setInterval(()=>{
index=(index+1)%idiomas.length;
titulo.textContent=idiomas[index];
},2000);

</script>

</body>
</html>
