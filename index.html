<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta em Formação</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    color:white;
    overflow:hidden;
    transition:0.4s;
    background: linear-gradient(-45deg, #000000, #1a001f, #300033, #000000);
    background-size:400% 400%;
    animation: fundoAnimado 15s ease infinite;
}

@keyframes fundoAnimado{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* EFEITO PARTÍCULAS */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px);
    background-size:40px 40px;
    animation: moverParticulas 60s linear infinite;
    opacity:0.2;
    z-index:-1;
}

@keyframes moverParticulas{
    from{transform:translateY(0);}
    to{transform:translateY(-500px);}
}

/* CONTAINER CENTRAL */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1{
    font-size:3rem;
    font-weight:700;
    letter-spacing:3px;
    background:linear-gradient(45deg, gold, darkred);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    margin-top:15px;
    font-weight:300;
    max-width:500px;
}

.botao{
    margin-top:40px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg, #8b0000, gold);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.botao:hover{
    transform:scale(1.1);
}

/* MENU */
.menu-icon{
    position:fixed;
    top:20px;
    left:20px;
    font-size:28px;
    cursor:pointer;
    z-index:1000;
}

.menu{
    position:fixed;
    top:0;
    left:-280px;
    width:250px;
    height:100%;
    background:#111;
    padding:30px;
    transition:0.4s;
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
}

.toggle-mode{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:black;
    color:white;
}

/* MODO CLARO */
.light{
    color:#111;
    background:linear-gradient(-45deg, #ffffff, #e0e0e0, #f5f5f5, #ffffff);
}

.light .menu{
    background:#eee;
}

.light .menu a{
    color:#111;
}

.light .toggle-mode{
    background:white;
    color:black;
}

</style>
</head>

<body>

<div class="menu-icon" onclick="abrirMenu()">≡</div>

<div class="menu" id="menu">
    <a href="#">Raças</a>
    <a href="#">Reinos</a>
    <a href="#">Biomas</a>
    <a href="#">Cristais</a>
    <a href="#">Culinária</a>
    <a href="#">Relíquias</a>
    <a href="#">Loja VIP</a>
    <a href="#">Loja Comum</a>
</div>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="container">
    <h1>PLANETA EM FORMAÇÃO</h1>
    <p>Um universo mágico, sombrio e cósmico está sendo criado.</p>
    <button class="botao" onclick="somClique()">Explorar</button>
</div>

<button class="toggle-mode" onclick="alternarModo()">Modo Claro</button>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>

function abrirMenu(){
    document.getElementById("menu").style.left="0";
    document.getElementById("overlay").style.display="block";
}

function fecharMenu(){
    document.getElementById("menu").style.left="-280px";
    document.getElementById("overlay").style.display="none";
}

function alternarModo(){
    document.body.classList.toggle("light");
}

function somClique(){
    document.getElementById("clickSound").play();
}

</script>

</body>
</html>
