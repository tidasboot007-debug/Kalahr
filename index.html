<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Kalahr</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
overflow:hidden;
font-family:Arial, sans-serif;
}

/* BORDAS DO SITE */
body::before{
content:"";
position:fixed;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:2px solid darkred;
pointer-events:none;
}

/* TÍTULO PRINCIPAL */
#titulo{
font-family:"Times New Roman", serif;
font-size:4rem;
text-align:center;
margin-top:25vh;
}

/* TEXTO DIREITA */
.top-right{
position:fixed;
top:20px;
right:30px;
font-family:'Raleway', sans-serif;
font-size:18px;
letter-spacing:2px;
}

/* MENU */
.menu-icon{
position:fixed;
top:20px;
left:30px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

.menu{
position:fixed;
top:0;
left:-25%;
width:25%;
height:100%;
background:#0a0a0a;
padding:40px;
transition:0.5s;
border-right:1px solid darkred;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:20px 0;
}

/* SANGUE */
.blood-drop{
position:fixed;
top:-20px;
width:3px;
height:20px;
background:darkred;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Culinária</a>
<a href="#">Relíquias</a>
<a href="#">Loja VIP</a>
<a href="#">Loja Comum</a>
</div>

<h1 id="titulo">Planeta Kalahr</h1>

<script>

/* MENU */
function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left === "0%" ? "-25%" : "0%";
}

/* TROCA DE IDIOMA */
const titulo=document.getElementById("titulo");
const idiomas=[
"Planeta Kalahr",
"Πλανήτης Kalahr",
"פלנטת Kalahr"
];

let index=0;

setInterval(()=>{
index=(index+1)%idiomas.length;
titulo.textContent=idiomas[index];
},1000);

/* GOTAS DE SANGUE */
function criarGota(){
const drop=document.createElement("div");
drop.classList.add("blood-drop");
drop.style.left=Math.random()*100+"vw";
drop.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(drop);

setTimeout(()=>{drop.remove();},5000);
}

setInterval(criarGota,200);

</script>

</body>
</html>
