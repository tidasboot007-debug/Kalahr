<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Inexistente</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cinzel', serif;
color:white;
overflow:hidden;
height:100vh;
background: radial-gradient(circle at center,#080808,#020202);
}

/* FUNDO TECNOLÓGICO */

.tech-lines{
position:fixed;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(0,255,255,0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.07) 1px, transparent 1px);

background-size:80px 80px;

animation:moveGrid 40s linear infinite;

pointer-events:none;
}

@keyframes moveGrid{
from{transform:translateY(0);}
to{transform:translateY(80px);}
}

/* VIDRO */

.glass{
position:fixed;
width:100%;
height:100%;

backdrop-filter:blur(10px);
background:rgba(255,255,255,0.02);

pointer-events:none;
}

/* NÉVOA */

.fog{
position:fixed;
width:200%;
height:200%;

background:
radial-gradient(circle at 30% 40%, rgba(255,255,255,0.04), transparent 60%),
radial-gradient(circle at 70% 60%, rgba(255,255,255,0.03), transparent 60%);

animation:fogMove 70s linear infinite;

pointer-events:none;
}

@keyframes fogMove{
from{transform:translate(0,0);}
to{transform:translate(-10%,-10%);}
}

/* PARTÍCULAS */

.particles span{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:float 18s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:0;
}
10%{opacity:1;}
to{
transform:translateY(-10vh);
opacity:0;
}
}

/* TÍTULO */

#titulo{
position:absolute;
top:20%;
left:50%;

transform:translate(-50%,-50%);

font-size:4.5rem;
letter-spacing:8px;
text-align:center;

text-shadow:
0 0 10px #00ffff,
0 0 30px #00ffff,
0 0 60px rgba(0,255,255,0.6);
}

/* TEXTO SUPERIOR */

.top-right{
position:fixed;
top:20px;
right:30px;

letter-spacing:4px;
font-size:14px;
opacity:0.8;
}

/* BOTÃO MENU */

.menu-icon{
position:fixed;
top:20px;
left:30px;

font-size:28px;
cursor:pointer;

text-shadow:0 0 10px cyan;
}

/* MENU LATERAL */

.menu{
position:fixed;
top:0;
left:-270px;

width:270px;
height:100%;

background:rgba(0,0,0,0.9);

backdrop-filter:blur(10px);

padding:80px 30px;

transition:0.5s;

border-right:1px solid rgba(0,255,255,0.4);

box-shadow:
0 0 20px rgba(0,255,255,0.2),
inset 0 0 20px rgba(0,255,255,0.1);
}

/* BOTÃO FECHAR */

.close-btn{
position:absolute;
top:15px;
right:20px;

font-size:28px;
cursor:pointer;

color:white;

text-shadow:
0 0 10px cyan;
}

.menu a{
display:block;
color:white;
text-decoration:none;

margin:18px 0;

font-size:18px;
letter-spacing:2px;

transition:0.3s;
}

.menu a:hover{

color:#00ffff;

transform:translateX(8px);

text-shadow:
0 0 10px cyan,
0 0 20px cyan;
}

/* COROA */

.crown{
position:fixed;

bottom:15px;
right:20px;

font-size:26px;

color:gold;

text-shadow:
0 0 10px gold,
0 0 20px gold,
0 0 30px rgba(255,215,0,0.7);
}

</style>
</head>

<body>

<div class="tech-lines"></div>
<div class="glass"></div>
<div class="fog"></div>

<div class="particles">
<span style="left:10%; animation-delay:0s;"></span>
<span style="left:30%; animation-delay:3s;"></span>
<span style="left:50%; animation-delay:6s;"></span>
<span style="left:70%; animation-delay:9s;"></span>
<span style="left:90%; animation-delay:12s;"></span>
</div>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="openMenu()">☰</div>

<div class="menu" id="menu">

<div class="close-btn" onclick="closeMenu()">✕</div>

<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Relíquias</a>
<a href="#">Loja VIP</a>
<a href="#">Loja Comum</a>
<a href="#">Culinária</a>

</div>

<h1 id="titulo">Planeta Inexistente</h1>

<div class="crown">👑</div>

<script>

const menu = document.getElementById("menu");

function openMenu(){
menu.style.left = "0";
}

function closeMenu(){
menu.style.left = "-270px";
}

const titulo=document.getElementById("titulo");

const idiomas=[

"Planeta Inexistente",
"Ανύπαρκτος Πλανήτης",
"כוכב לא קיים",
"존재하지 않는 행성",
"كوكب غير موجود",
"ดาวเคราะห์ที่ไม่มีอยู่",
"Несуществующая Планета"

];

let index=0;

setInterval(()=>{

index=(index+1)%idiomas.length;

titulo.textContent=idiomas[index];

},1000);

</script>

</body>
</html>
