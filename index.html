<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Inexistente</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cinzel', serif;
color:white;
overflow:hidden;
background:black;

/* IMAGEM COMPLETA SEM CORTAR */
background-image:url("fundo.jpg");
background-size:contain; /* mostra a imagem inteira */
background-position:center center;
background-repeat:no-repeat;
background-color:black;
}

/* CAMADA ESCURA */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

/* NÉVOA ANIMADA */
.fog{
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05), transparent 60%),
radial-gradient(circle at 70% 70%, rgba(255,255,255,0.04), transparent 60%);
animation:fogMove 40s linear infinite;
z-index:0;
pointer-events:none;
}

@keyframes fogMove{
from{transform:translate(0,0);}
to{transform:translate(-10%, -10%);}
}

/* PARTÍCULAS */
.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.particles span{
position:absolute;
width:3px;
height:3px;
background:rgba(255,255,255,0.4);
border-radius:50%;
animation:float 15s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:0;
}
10%{opacity:1;}
to{
transform:translateY(-10vh);
opacity:0;
}
}

/* TITULO */
#titulo{
position:absolute;
top:18%;
left:50%;
transform:translate(-50%,-50%);
font-size:4.5rem;
letter-spacing:6px;
text-align:center;
font-family:"Times New Roman", serif;

text-shadow:
0 0 10px #8b0000,
0 0 20px #8b0000,
0 0 40px #4b0000,
2px 2px 0 #000,
-2px -2px 0 #000;

z-index:2;
}

/* TOPO DIREITO */
.top-right{
position:fixed;
top:20px;
right:30px;
letter-spacing:4px;
font-size:14px;
opacity:0.85;
z-index:2;
}

/* MENU */
.menu-icon{
position:fixed;
top:20px;
left:30px;
font-size:28px;
cursor:pointer;
z-index:3;
}

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.96);
padding:70px 30px;
transition:0.55s;
border-right:1px solid darkred;
z-index:3;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:18px 0;
font-size:18px;
transition:0.3s;
}

.menu a:hover{
color:#8b0000;
transform:translateX(6px);
}

</style>
</head>

<body>

<div class="overlay"></div>
<div class="fog"></div>

<div class="particles">
<span style="left:10%; animation-delay:0s;"></span>
<span style="left:25%; animation-delay:3s;"></span>
<span style="left:40%; animation-delay:6s;"></span>
<span style="left:60%; animation-delay:9s;"></span>
<span style="left:75%; animation-delay:12s;"></span>
<span style="left:90%; animation-delay:15s;"></span>
</div>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Relíquias</a>
<a href="#">Loja VIP</a>
<a href="#">Loja Comum</a>
<a href="#">Culinária</a>
</div>

<h1 id="titulo">Planeta Inexistente</h1>

<script>
function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
}

const titulo=document.getElementById("titulo");

const idiomas=[
"Planeta Inexistente",
"Ανύπαρκτος Πλανήτης",
"כוכב לא קיים",
"존재하지 않는 행성",
"كوكب غير موجود",
"ดาวเคราะห์ที่ไม่มีอยู่",
"Несуществующая Планета"
];

let index=0;

setInterval(()=>{
index=(index+1)%idiomas.length;
titulo.textContent=idiomas[index];
},1000);
</script>

</body>
</html>
