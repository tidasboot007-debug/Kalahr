<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Inexistente</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cinzel', serif;
color:white;
overflow:hidden;
background:black;
}

/* VIDEO FUNDO */
#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* CAMADA ESCURA */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-2;
}

/* REFLEXO VIDRO */
.glass{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(120deg, rgba(255,255,255,0.06), transparent 40%),
linear-gradient(300deg, rgba(255,0,0,0.05), transparent 60%);
pointer-events:none;
z-index:-1;
}

/* TITULO PRINCIPAL */
#titulo{
position:absolute;
top:18%;
left:50%;
transform:translateX(-50%);
font-family:'Playfair Display', serif;
font-size:4.2rem;
letter-spacing:6px;
text-align:center;
color:#f5e6d3;

text-shadow:
0 0 6px rgba(255,255,255,0.3),
0 0 15px rgba(255,0,0,0.4),
0 0 30px rgba(120,0,0,0.7);
}

/* TEXTO SUPERIOR DIREITO */
.top-right{
position:fixed;
top:25px;
right:35px;
font-family:Raleway, sans-serif;
letter-spacing:4px;
font-size:15px;
opacity:0.8;
}

/* MENU ICON */
.menu-icon{
position:fixed;
top:25px;
left:35px;
font-size:30px;
cursor:pointer;
z-index:1000;
transition:0.3s;
}

.menu-icon:hover{
transform:scale(1.2);
color:red;
}

/* MENU LATERAL */
.menu{
position:fixed;
top:0;
left:-25%;
width:25%;
height:100%;
background:rgba(0,0,0,0.97);
padding:90px 40px;
transition:0.6s;
border-right:1px solid darkred;
z-index:999;
backdrop-filter:blur(6px);
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:25px 0;
font-size:20px;
letter-spacing:2px;
transition:0.3s;
}

.menu a:hover{
color:red;
transform:translateX(10px);
text-shadow:0 0 10px red;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
<source src="sangue.mp4.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="glass"></div>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Relíquias</a>
<a href="#">Culinária</a>
<a href="#">Loja VIP</a>
<a href="#">Loja Comum</a>
</div>

<h1 id="titulo">Planeta Inexistente</h1>

<script>

/* MENU */
function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left === "0%" ? "-25%" : "0%";
}

/* IDIOMAS */
const titulo=document.getElementById("titulo");

const idiomas=[
"Planeta Inexistente",
"Ανύπαρκτος Πλανήτης",
"כוכב לא קיים",
"존재하지 않는 행성",
"كوكب غير موجود",
"ดาวเคราะห์ที่ไม่มีอยู่",
"Несуществующая Планета"
];

let index=0;

setInterval(()=>{
index=(index+1)%idiomas.length;
titulo.textContent=idiomas[index];
},1000); // velocidade dobrada

</script>

</body>
</html>
