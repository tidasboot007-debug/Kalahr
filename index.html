<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Existente</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: radial-gradient(circle at center, #0f0f0f 0%, #050505 60%, #000000 100%);
color:white;
overflow:hidden;
font-family:Arial, sans-serif;
height:100vh;
}

/* Efeito vidro */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
backdrop-filter: blur(3px);
pointer-events:none;
}

/* Borda */
body::before{
content:"";
position:fixed;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:1px solid rgba(150,0,0,0.6);
pointer-events:none;
}

/* Souls Of Khaal */
.top-right{
position:fixed;
top:20px;
right:30px;
font-family:'Raleway', sans-serif;
letter-spacing:3px;
font-size:18px;
opacity:0.8;
}

/* Título */
#titulo{
font-family:"Times New Roman", serif;
font-size:4rem;
text-align:center;
margin-top:25vh;
transition:0.5s;
}

/* MENU */
.menu-icon{
position:fixed;
top:20px;
left:30px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

.menu{
position:fixed;
top:0;
left:-25%;
width:25%;
height:100%;
background:rgba(10,10,10,0.95);
padding:40px;
transition:0.6s;
border-right:1px solid darkred;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:20px 0;
opacity:0.8;
}

/* SANGUE REALISTA */
.blood{
position:absolute;
top:-150px;
width:12px;
height:150px;
background:linear-gradient(to bottom, #7a0000, #3a0000);
border-radius:50px;
filter: blur(0.5px);
animation:drip linear forwards;
}

@keyframes drip{
0%{
transform:translateY(0);
opacity:0.9;
}
90%{
opacity:0.9;
}
100%{
transform:translateY(120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Relíquias</a>
</div>

<h1 id="titulo">Planeta Existente</h1>

<script>

/* MENU */
function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left === "0%" ? "-25%" : "0%";
}

/* TROCA DE IDIOMAS */
const titulo=document.getElementById("titulo");

const idiomas=[
"Planeta Existente",
"Υπάρχων Πλανήτης",
"כוכב קיים",
"존재하는 행성",
"كوكب موجود",
"ดาวเคราะห์ที่มีอยู่",
"Существующая Планета"
];

let index=0;

setInterval(()=>{
index=(index+1)%idiomas.length;
titulo.textContent=idiomas[index];
},1000);

/* CRIAR SANGUE ESCORRENDO */
function criarSangue(){
const sangue=document.createElement("div");
sangue.classList.add("blood");

sangue.style.left=Math.random()*100+"vw";
sangue.style.animationDuration=(Math.random()*6+6)+"s";

document.body.appendChild(sangue);

setTimeout(()=>{
sangue.remove();
},12000);
}

setInterval(criarSangue,800);

</script>

</body>
</html>
