<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Existente</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at 50% 20%, #111 0%, #050505 40%, #000 100%);
color:white;
overflow:hidden;
height:100vh;
font-family:Arial, sans-serif;
}

/* Reflexo de vidro leve */
.glass-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg, rgba(255,255,255,0.04), transparent 40%);
pointer-events:none;
}

/* Borda */
body::before{
content:"";
position:fixed;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:1px solid rgba(150,0,0,0.6);
pointer-events:none;
}

/* Souls */
.top-right{
position:fixed;
top:20px;
right:30px;
font-family:'Raleway', sans-serif;
letter-spacing:3px;
font-size:18px;
opacity:0.8;
}

/* Título */
#titulo{
font-family:"Times New Roman", serif;
font-size:4rem;
text-align:center;
margin-top:25vh;
}

/* MENU */
.menu-icon{
position:fixed;
top:20px;
left:30px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

.menu{
position:fixed;
top:0;
left:-25%;
width:25%;
height:100%;
background:#0a0a0a;
padding:40px;
transition:0.6s;
border-right:1px solid darkred;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:20px 0;
}

/* SANGUE SVG */
.blood-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.blood{
position:absolute;
animation:drip linear forwards;
}

@keyframes drip{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="glass-overlay"></div>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Relíquias</a>
</div>

<h1 id="titulo">Planeta Existente</h1>

<div class="blood-container" id="bloodContainer"></div>

<script>

/* MENU */
function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left === "0%" ? "-25%" : "0%";
}

/* IDIOMAS */
const titulo=document.getElementById("titulo");

const idiomas=[
"Planeta Existente",
"Υπάρχων Πλανήτης",
"כוכב קיים",
"존재하는 행성",
"كوكب موجود",
"ดาวเคราะห์ที่มีอยู่",
"Существующая Планета"
];

let index=0;

setInterval(()=>{
index=(index+1)%idiomas.length;
titulo.textContent=idiomas[index];
},1000);

/* SANGUE ORGÂNICO */
function criarSangue(){

const container=document.getElementById("bloodContainer");

const sangue=document.createElementNS("http://www.w3.org/2000/svg","svg");
sangue.setAttribute("width","40");
sangue.setAttribute("height","150");
sangue.classList.add("blood");

sangue.style.left=Math.random()*100+"vw";
sangue.style.top="-150px";
sangue.style.animationDuration=(Math.random()*6+6)+"s";

const path=document.createElementNS("http://www.w3.org/2000/svg","path");

path.setAttribute("d",
"M20 0 C 5 40, 35 60, 20 120 C 10 140, 30 140, 20 150 Z"
);

path.setAttribute("fill","#6b0000");

sangue.appendChild(path);
container.appendChild(sangue);

setTimeout(()=>{
sangue.remove();
},12000);

}

setInterval(criarSangue,1500);

</script>

</body>
</html>
