<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Planeta Inexistente</title>

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    
    /* IMAGEM DE FUNDO */
    background-image: url("fundo.png");
    background-size: cover;        /* cobre toda a tela */
    background-position: center;   /* centraliza */
    background-repeat: no-repeat;  /* não repete */
    background-attachment: fixed;  /* efeito imersivo */
    
    overflow: hidden;
  }

  h1 {
    position: absolute;
    top: 15%; /* mais acima da tela */
    width: 100%;
    text-align: center;
    color: white;
    font-size: 70px;
    font-family: serif;
    letter-spacing: 5px;
    text-shadow:
      0 0 10px red,
      0 0 20px darkred,
      0 0 40px crimson;
  }
</style>

</head>
<body>

<h1>Planeta Inexistente</h1>

</body>
</html>
