<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeta Inexistente</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cinzel', serif;
color:white;
overflow:hidden;
background-color:black;

/* USE O NOME EXATO DO SEU ARQUIVO */
background-image:url("fundo.png.jpeg");
background-size:contain;   /* mostra a imagem inteira */
background-position:center;
background-repeat:no-repeat;
}

/* CAMADA ESCURA SUAVE */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
pointer-events:none;
}

/* NÉVOA LEVE */
.fog{
position:fixed;
top:0;
left:0;
width:150%;
height:150%;
background:radial-gradient(circle at 40% 40%, rgba(255,255,255,0.04), transparent 60%);
animation:fogMove 60s linear infinite;
pointer-events:none;
}

@keyframes fogMove{
from{transform:translate(0,0);}
to{transform:translate(-8%, -8%);}
}

/* PARTÍCULAS */
.particles span{
position:fixed;
width:2px;
height:2px;
background:rgba(255,255,255,0.5);
border-radius:50%;
animation:float 18s linear infinite;
pointer-events:none;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:0;
}
10%{opacity:1;}
to{
transform:translateY(-10vh);
opacity:0;
}
}

/* TÍTULO */
#titulo{
position:absolute;
top:18%;
left:50%;
transform:translate(-50%,-50%);
font-size:4.5rem;
letter-spacing:6px;
text-align:center;
font-family:"Times New Roman", serif;

text-shadow:
0 0 10px #8b0000,
0 0 20px #8b0000,
2px 2px 0 #000;
}

/* TOPO DIREITO */
.top-right{
position:fixed;
top:20px;
right:30px;
letter-spacing:4px;
font-size:14px;
opacity:0.85;
}

/* MENU */
.menu-icon{
position:fixed;
top:20px;
left:30px;
font-size:28px;
cursor:pointer;
}

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.95);
padding:70px 30px;
transition:0.5s;
border-right:1px solid darkred;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:18px 0;
font-size:18px;
transition:0.3s;
}

.menu a:hover{
color:#8b0000;
transform:translateX(6px);
}

</style>
</head>

<body>

<div class="overlay"></div>
<div class="fog"></div>

<!-- partículas -->
<span class="particles" style="left:10%; animation-delay:0s;"></span>
<span class="particles" style="left:30%; animation-delay:4s;"></span>
<span class="particles" style="left:50%; animation-delay:8s;"></span>
<span class="particles" style="left:70%; animation-delay:12s;"></span>
<span class="particles" style="left:90%; animation-delay:16s;"></span>

<div class="top-right">Souls Of Khaal</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Raças</a>
<a href="#">Reinos</a>
<a href="#">Biomas</a>
<a href="#">Cristais</a>
<a href="#">Relíquias</a>
<a href="#">Loja VIP</a>
<a href="#">Loja Comum</a>
<a href="#">Culinária</a>
</div>

<h1 id="titulo">Planeta Inexistente</h1>

<script>
function toggleMenu(){
const menu=document.getElementById("menu");
menu.style.left = menu.style.left === "0px" ? "-260px" : "0px";
}

const titulo=document.getElementById("titulo");

const idiomas=[
"Planeta Inexistente",
"Ανύπαρκτος Πλανήτης",
"כוכב לא קיים",
"존재하지 않는 행성",
"كوكب غير موجود",
"ดาวเคราะห์ที่ไม่มีอยู่",
"Несуществующая Планета"
];

let index=0;

setInterval(()=>{
index=(index+1)%idiomas.length;
titulo.textContent=idiomas[index];
},1000);
</script>

</body>
</html>
